syntax = "proto3";

service UserService {
  rpc GetUser (GetUserRequest) returns (GetUserResponse);
}

message GetUserRequest {
  string userId = 1;
}

message GetUserResponse {
  bool exists = 1;
  string userId = 2;
  string email = 3;
  string phone = 4;
  string preferredChannel = 5; // "email" | "sms"
}
